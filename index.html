<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>white roses</title>
<style>
  body {
    margin: 0;
    background: #000;
    color: #e6e6e6;
    font-family: "Courier New", monospace;
  }

  #output {
    padding: 20px;
    height: 80vh;
    overflow-y: auto;
    white-space: pre-wrap;
    line-height: 1.5;
  }

  #input-area {
    padding: 10px;
    border-top: 1px solid #333;
  }

  input {
    width: 98%;
    padding: 10px;
    background: #111;
    border: 1px solid #444;
    color: #eee;
    font-family: inherit;
    font-size: 16px;
  }

  .spitty {
    opacity: 0;
    display: inline-block;
    animation: spit 0.4s forwards;
  }

  @keyframes spit {
    0%   { opacity: 0; transform: translateY(3px) scale(0.95); filter: blur(3px); }
    40%  { opacity: 1; transform: translateY(-1px) scale(1.03); filter: blur(0px); }
    100% { opacity: 1; transform: translateY(0px) scale(1); }
  }
</style>
</head>
<body>

<div id="output"></div>

<div id="input-area">
  <input id="command" placeholder="Type a direction (north/south/east/west) or 'quit'">
</div>

<script>
const PLACES = [
  "the empty lot with no motel",
  "the wind corridor",
  "the autoclave room",
  "I’m only making you do it — it’s exactly what you want",
  "the industrial field of soft black plants",
  "don’t say that. don’t open your mouth",
  "the dog’s ‘humanized moan’ aegooo eaaegooo aegoo",
  "the field of white roses",
  "can you shut the fuck up",
  "the soft mechanical clearing"
];

const DESCRIPTIONS = [
  "you open my mouth, then “sell-speak” through me.",
  "A soft mechanical hum drifts through the air.",
  "I’m afraid of being left.",
  "The ground feels like a document someone forgot to finish.",
  "praying.",
  "Something about the place feels half-remembered.",
  "The sky seems to hesitate before settling.",
  "that’s what you want.",
  "what you want.",
  "The air feels like it’s waiting for you to speak first."
];

const EVENTS = [
  "I really hate women,” you chant, and you mean it",
  '<a href="poem9.html">the outskirts of a forest</a>',
  '<a href="poem8.html">a living thing</a>',
  '<a href="poem2.html">a playing board</a>',
  '<a href="poem.html">drunk spiral</a>',
  "A pattern repeats, then repeats differently.",
  "A quiet tone rises, then dissolves.",
  "The air thickens, then clears.",
  "A structure rearranges itself when you look away."
];

const size = 5;
let town = {};
for (let x = 0; x < size; x++) {
  for (let y = 0; y < size; y++) {
    town[`${x},${y}`] = {
      place: PLACES[Math.floor(Math.random() * PLACES.length)],
      description: DESCRIPTIONS[Math.floor(Math.random() * DESCRIPTIONS.length)]
    };
  }
}

let player_x = Math.floor(size / 2);
let player_y = Math.floor(size / 2);

const output = document.getElementById("output");
const input = document.getElementById("command");

function spit(text) {
  const line = document.createElement("div");

  if (text.includes("<a ")) {
    line.innerHTML = text;
    output.appendChild(line);
    output.scrollTop = output.scrollHeight;
    return;
  }

  text.split("").forEach((char, i) => {
    const span = document.createElement("span");
    span.textContent = char;
    span.className = "spitty";
    span.style.animationDelay = (i * 0.01 + Math.random() * 0.03) + "s";
    line.appendChild(span);
  });

  output.appendChild(line);
  output.scrollTop = output.scrollHeight;
}

function describe_location() {
  const loc = town[`${player_x},${player_y}`];
  spit("");
  spit("You arrive at " + loc.place);
  spit(loc.description);
  spit(EVENTS[Math.floor(Math.random() * EVENTS.length)]);
}

function move(direction) {
  let dx = 0, dy = 0;

  if (direction === "north") dy = -1;
  if (direction === "south") dy = 1;
  if (direction === "east") dx = 1;
  if (direction === "west") dx = -1;

  const nx = player_x + dx;
  const ny = player_y + dy;

  if (town.hasOwnProperty(`${nx},${ny}`)) {
    player_x = nx;
    player_y = ny;
    describe_location();
  } else {
    spit("");
    spit("You walk toward the edge of the town.");
    spit("The land refuses.");
  }
}

function processCommand(cmd) {
  cmd = cmd.trim().toLowerCase();

  if (cmd === "quit") {
    spit("");
    spit("You step out of the town. It folds itself into a flat white sheet.");
    spit("The roses close behind you.");
    return;
  }

  if (["north","south","east","west"].includes(cmd)) {
    move(cmd);
  } else {
    spit("");
    spit("The town does not understand you.");
  }
}

input.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const cmd = input.value;
    input.value = "";
    processCommand(cmd);
  }
});

// Start at initial location
describe_location();
</script>

</body>
</html>
