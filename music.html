<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pass Out Simulator</title>

<style>
    body {
        background: black;
        color: white;
        font-family: monospace;
        text-align: center;
        padding-top: 40px;
    }

    h1 {
        font-size: 40px;
        margin-bottom: 30px;
    }

    .grid {
        display: flex;
        justify-content: center;
        gap: 30px;
        margin-top: 40px;
    }

    .imgbox {
        width: 200px;
        height: 200px;
        overflow: hidden;
        position: relative;
        cursor: pointer;
    }

    .imgbox img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 1s ease, opacity 1s ease;
    }

    .gone {
        transform: scale(3) rotate(720deg) translateY(-300px);
        opacity: 0;
    }

    .replaceText {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-size: 20px;
        opacity: 0;
        transition: opacity 0.5s ease;
    }

    .showText {
        opacity: 1;
    }
</style>
</head>
<body>

<h1>CLICK ON ALL THE SAFE PHRASES</h1>

<div class="grid">
    <div class="imgbox" onclick="removeImage(this)">
        <img src="img3.jpg">
        <div class="replaceText">where is she, where is she, where is she, where is she</div>
    </div>

    <div class="imgbox" onclick="removeImage(this)">
        <img src="img3.jpg">
        <div class="replaceText">where is she, where is she, where is she, where is she</div>
    </div>

    <div class="imgbox" onclick="removeImage(this)">
        <img src="img3.jpg">
        <div class="replaceText">where is she, where is she, where is she, where is she</div>
    </div>

    <div class="imgbox" onclick="removeImage(this)">
        <img src="img3.jpg">
        <div class="replaceText">where is she, where is she, where is she, where is she</div>
    </div>
</div>

<script>
// ---------------- IMAGE REMOVAL ----------------
let removedCount = 0;

function removeImage(box) {
    const img = box.querySelector("img");
    const txt = box.querySelector(".replaceText");

    img.classList.add("gone");
    setTimeout(() => txt.classList.add("showText"), 400);

    removedCount++;
    if (removedCount >= 4) {
        setTimeout(() => {
            window.location.href = "sayingthings.html";
        }, 1500);
    }
}

// ----------------  SYNTH SONG ----------------
const ctx = new (window.AudioContext || window.webkitAudioContext)();

function playNote(freq, time, duration, type="sine", vol=0.2) {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = type;
    osc.frequency.value = freq;

    gain.gain.setValueAtTime(0.0001, time);
    gain.gain.exponentialRampToValueAtTime(vol, time + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.0001, time + duration);

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start(time);
    osc.stop(time + duration + 0.1);
}

// ---------------- FULL ORIGINAL BEATLES-STYLE SONG ----------------
const ctx = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freq, time, duration, type="sine", vol=0.2) {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = type;
    osc.frequency.value = freq;

    gain.gain.setValueAtTime(0.0001, time);
    gain.gain.exponentialRampToValueAtTime(vol, time + 0.03);
    gain.gain.exponentialRampToValueAtTime(0.0001, time + duration);

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start(time);
    osc.stop(time + duration + 0.1);
}

function drumKick(time) {
    playTone(60, time, 0.15, "sine", 0.4);
}

function drumSnare(time) {
    playTone(180, time, 0.1, "triangle", 0.25);
}

function drumHat(time) {
    playTone(8000, time, 0.05, "square", 0.1);
}

function startFullSong() {
    const now = ctx.currentTime;

    // Chords: C → Am → F → G
    const chords = [
        [261, 329, 392], // C major
        [220, 261, 330], // A minor
        [175, 220, 262], // F major
        [196, 246, 294]  // G major
    ];

    let t = now;

    for (let m = 0; m < 4; m++) {  // 4 measures
        const chord = chords[m % 4];

        // ORGAN CHORD
        chord.forEach(freq => {
            playTone(freq, t, 0.7, "sine", 0.18);
        });

        // BASSLINE (Beatles walking style)
        playTone(chord[0] / 2, t, 0.3, "square", 0.3);
        playTone(chord[0] / 2 + 20, t + 0.35, 0.25, "square", 0.25);
        playTone(chord[0] / 2 + 40, t + 0.55, 0.25, "square", 0.25);

        // MELODY (original)
        playTone(chord[1] + 120, t + 0.1, 0.25, "triangle", 0.2);
        playTone(chord[2] + 150, t + 0.45, 0.25, "triangle", 0.2);

        // DRUMS
        drumKick(t);
        drumSnare(t + 0.35);
        drumHat(t + 0.15);
        drumHat(t + 0.45);

        t += 0.7;
    }
}

window.addEventListener("click", () => {
    if (ctx.state === "suspended") ctx.resume();
    startFullSong();
}, { once: true });

</script>

</body>
</html>
